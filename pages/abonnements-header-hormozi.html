<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Hero abonnements Stratos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: transparent; }
  body {
    font-family: 'Roboto', -apple-system, BlinkMacSystemFont, sans-serif;
    color: #212121;
  }
  .hero {
    background: #F6F6F6;
    padding: 60px 24px 50px;
    text-align: center;
  }
  .inner { max-width: 720px; margin: 0 auto; }

  .eyebrow {
    display: inline-block;
    padding: 5px 14px;
    background: #000;
    color: #05E00B;
    font-family: 'Oswald', sans-serif;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    margin-bottom: 22px;
  }

  h1 {
    font-family: 'Oswald', sans-serif;
    font-size: clamp(36px, 5.5vw, 56px);
    line-height: 1;
    font-weight: 600;
    color: #212121;
    text-transform: uppercase;
    margin-bottom: 16px;
  }
  h1 .green { color: #05E00B; }

  p.sub {
    font-family: 'Roboto', sans-serif;
    font-weight: 300;
    font-size: clamp(15px, 1.7vw, 17px);
    color: #646464;
    max-width: 540px;
    margin: 0 auto;
    line-height: 1.5;
  }

  @media (max-width: 600px) {
    .hero { padding: 44px 18px 36px; }
  }
</style>
</head>
<body>

<section class="hero">
  <div class="inner">
    <div class="eyebrow">Abonnements Pilotes</div>
    <h1>Choisis <span class="green">ta formule</span></h1>
    <p class="sub">Engagement 6 mois minimum, puis résiliable à tout moment.</p>
  </div>
</section>

<script>
  function postHeight() {
    if (window.parent !== window) {
      window.parent.postMessage({ type: 'stratos-iframe-height', height: document.documentElement.scrollHeight }, '*');
    }
  }
  window.addEventListener('load', postHeight);
  window.addEventListener('resize', postHeight);
  new ResizeObserver(postHeight).observe(document.documentElement);
</script>

</body>
</html>
