<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Hero abonnements Stratos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: transparent; }
  body {
    font-family: 'Roboto', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color: #fff;
  }
  .hero {
    position: relative;
    padding: 70px 24px 56px;
    text-align: center;
    overflow: hidden;
    background:
      linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.7)),
      url('https://static.wixstatic.com/media/263755_f4f8ed7b7e634004895ff5f8447bf40f~mv2.jpg/v1/fill/w_1920,h_900,q_85/file.jpg') center/cover no-repeat,
      #0a0a0a;
  }
  .inner { position: relative; max-width: 780px; margin: 0 auto; }

  .eyebrow {
    display: inline-block;
    padding: 4px 14px;
    background: #05E00B;
    color: #000;
    font-family: 'Oswald', sans-serif;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    margin-bottom: 22px;
  }

  h1 {
    font-family: 'Oswald', sans-serif;
    font-size: clamp(40px, 6vw, 64px);
    line-height: 1;
    letter-spacing: 0;
    font-weight: 600;
    color: #fff;
    text-transform: uppercase;
    margin-bottom: 14px;
  }
  h1 .green { color: #05E00B; }

  p.sub {
    font-family: 'Roboto', sans-serif;
    font-weight: 300;
    font-size: clamp(15px, 1.6vw, 18px);
    color: #e2e2e2;
    max-width: 560px;
    margin: 0 auto 30px;
    line-height: 1.5;
  }

  .arrow-cta { margin-top: 8px; }
  .arrow-cta .label {
    display: inline-block;
    font-family: 'Oswald', sans-serif;
    font-size: 13px;
    color: #05E00B;
    font-weight: 600;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 12px;
  }
  .arrow-cta .down {
    display: block;
    margin: 0 auto;
    width: 28px; height: 28px;
    color: #05E00B;
    animation: bounce 1.8s infinite;
    filter: drop-shadow(0 0 8px rgba(5,224,11,0.4));
  }
  @keyframes bounce {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(8px); }
  }

  @media (max-width: 600px) {
    .hero { padding: 50px 18px 40px; }
  }
</style>
</head>
<body>

<section class="hero">
  <div class="inner">

    <div class="eyebrow">Abonnements Pilotes</div>

    <h1>Choisis <span class="green">ta formule</span></h1>

    <p class="sub">Engagement 6 mois minimum, puis résiliable à tout moment.</p>

    <div class="arrow-cta">
      <span class="label">Formules ci-dessous</span>
      <svg class="down" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
    </div>

  </div>
</section>

<script>
  function postHeight() {
    if (window.parent !== window) {
      window.parent.postMessage({ type: 'stratos-iframe-height', height: document.documentElement.scrollHeight }, '*');
    }
  }
  window.addEventListener('load', postHeight);
  window.addEventListener('resize', postHeight);
  new ResizeObserver(postHeight).observe(document.documentElement);
</script>

</body>
</html>
