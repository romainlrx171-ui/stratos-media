<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Hero abonnements Stratos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: transparent; }
  body {
    font-family: 'Roboto', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color: #212121;
    line-height: 1.5;
  }
  .hero {
    background: #F6F6F6;
    padding: 56px 24px 44px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .hero::before {
    content: '';
    position: absolute;
    left: 50%; bottom: 0;
    transform: translateX(-50%);
    width: 240px; height: 4px;
    background: #05E00B;
    border-radius: 2px;
  }
  .inner { position: relative; max-width: 760px; margin: 0 auto; }

  .eyebrow {
    display: inline-block;
    padding: 5px 14px;
    background: #000;
    color: #05E00B;
    border-radius: 100px;
    font-family: 'Oswald', sans-serif;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    margin-bottom: 22px;
  }

  h1 {
    font-family: 'Oswald', sans-serif;
    font-size: clamp(38px, 6vw, 60px);
    line-height: 1;
    letter-spacing: -0.01em;
    font-weight: 700;
    color: #000;
    text-transform: uppercase;
    margin-bottom: 16px;
  }
  h1 .green {
    color: #05E00B;
    -webkit-text-stroke: 1px #000;
    text-shadow: 2px 2px 0 #000;
  }
  /* fallback for browsers without webkit-text-stroke */
  @supports not (-webkit-text-stroke: 1px black) {
    h1 .green { text-shadow: none; }
  }

  p.sub {
    font-family: 'Roboto', sans-serif;
    font-weight: 400;
    font-size: clamp(15px, 1.7vw, 17px);
    color: #5d5d61;
    max-width: 540px;
    margin: 0 auto 30px;
  }

  .arrow-cta { margin-top: 4px; }
  .arrow-cta .label {
    display: inline-block;
    font-family: 'Oswald', sans-serif;
    font-size: 13px;
    color: #000;
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .arrow-cta .down {
    display: block;
    margin: 0 auto;
    width: 28px; height: 28px;
    color: #05E00B;
    animation: bounce 1.8s infinite;
  }
  @keyframes bounce {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(8px); }
  }

  @media (max-width: 600px) {
    .hero { padding: 40px 18px 32px; }
  }
</style>
</head>
<body>

<section class="hero">
  <div class="inner">

    <div class="eyebrow">Abonnements Pilotes</div>

    <h1>Choisis <span class="green">ta formule</span></h1>

    <p class="sub">Engagement 6 mois minimum, puis résiliable à tout moment.</p>

    <div class="arrow-cta">
      <span class="label">Formules ci-dessous</span>
      <svg class="down" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
    </div>

  </div>
</section>

<script>
  function postHeight() {
    if (window.parent !== window) {
      window.parent.postMessage({ type: 'stratos-iframe-height', height: document.documentElement.scrollHeight }, '*');
    }
  }
  window.addEventListener('load', postHeight);
  window.addEventListener('resize', postHeight);
  new ResizeObserver(postHeight).observe(document.documentElement);
</script>

</body>
</html>
