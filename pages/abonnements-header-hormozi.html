<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Hero abonnements Stratos</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: transparent; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", sans-serif;
    color: #ecf1f7;
    line-height: 1.4;
  }
  .hero {
    background:
      radial-gradient(ellipse at top, rgba(34,197,94,0.15), transparent 55%),
      linear-gradient(180deg, #0a0e13 0%, #0f1419 100%);
    padding: 60px 24px 50px;
    text-align: center;
    position: relative;
    overflow: hidden;
    border-radius: 0 0 16px 16px;
  }
  .hero::before {
    content: '';
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(34,197,94,0.035) 1px, transparent 1px),
      linear-gradient(90deg, rgba(34,197,94,0.035) 1px, transparent 1px);
    background-size: 50px 50px;
    mask-image: radial-gradient(ellipse at center, black, transparent 65%);
    pointer-events: none;
  }
  .inner { position: relative; max-width: 720px; margin: 0 auto; }

  .eyebrow {
    display: inline-block;
    padding: 4px 12px;
    background: rgba(34,197,94,0.1);
    border: 1px solid rgba(34,197,94,0.3);
    border-radius: 100px;
    font-size: 11.5px;
    color: #22c55e;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 18px;
  }

  h1 {
    font-size: clamp(32px, 5vw, 48px);
    line-height: 1.1;
    letter-spacing: -0.02em;
    font-weight: 800;
    margin-bottom: 14px;
    color: #f2f6fa;
  }
  h1 .green { color: #22c55e; }

  p.sub {
    font-size: clamp(15px, 1.8vw, 17px);
    color: #9aa6b8;
    max-width: 540px;
    margin: 0 auto 28px;
  }

  .arrow-cta {
    margin-top: 6px;
  }
  .arrow-cta .label {
    display: inline-block;
    font-size: 13px;
    color: #22c55e;
    font-weight: 700;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .arrow-cta .down {
    display: block;
    margin: 0 auto;
    width: 26px; height: 26px;
    color: #22c55e;
    animation: bounce 2s infinite;
  }
  @keyframes bounce {
    0%,100% { transform: translateY(0); opacity: 0.7; }
    50% { transform: translateY(6px); opacity: 1; }
  }

  @media (max-width: 600px) {
    .hero { padding: 44px 18px 36px; }
  }
</style>
</head>
<body>

<section class="hero">
  <div class="inner">

    <div class="eyebrow">Abonnements pilotes</div>

    <h1>Choisis <span class="green">ta formule</span>.</h1>

    <p class="sub">Engagement 6 mois minimum, puis résiliable à tout moment.</p>

    <div class="arrow-cta">
      <span class="label">Formules ci-dessous</span>
      <svg class="down" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
    </div>

  </div>
</section>

<script>
  function postHeight() {
    if (window.parent !== window) {
      window.parent.postMessage({ type: 'stratos-iframe-height', height: document.documentElement.scrollHeight }, '*');
    }
  }
  window.addEventListener('load', postHeight);
  window.addEventListener('resize', postHeight);
  new ResizeObserver(postHeight).observe(document.documentElement);
</script>

</body>
</html>
