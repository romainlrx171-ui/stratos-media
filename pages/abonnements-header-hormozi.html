<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Hero abonnements Stratos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: transparent; }
  body {
    font-family: 'Roboto', -apple-system, BlinkMacSystemFont, sans-serif;
    color: #fff;
  }
  .hero {
    position: relative;
    padding: 70px 24px 56px;
    text-align: center;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 360px;
    background:
      linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.7)),
      url('https://romainlrx171-ui.github.io/stratos-media/images/hero-stratos-20.jpg') center/cover no-repeat,
      #0a0a0a;
  }
  .inner { position: relative; max-width: 780px; margin: 0 auto; }

  .eyebrow {
    display: inline-block;
    padding: 5px 14px;
    background: #05E00B;
    color: #000;
    font-family: 'Oswald', sans-serif;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    margin-bottom: 22px;
  }

  h1 {
    font-family: 'Oswald', sans-serif;
    font-size: clamp(40px, 6vw, 64px);
    line-height: 1;
    font-weight: 600;
    color: #fff;
    text-transform: uppercase;
    margin-bottom: 16px;
  }
  h1 .green { color: #05E00B; }

  p.sub {
    font-family: 'Roboto', sans-serif;
    font-weight: 300;
    font-size: clamp(16px, 1.8vw, 19px);
    color: #e2e2e2;
    max-width: 560px;
    margin: 0 auto;
    line-height: 1.5;
  }

  @media (max-width: 768px) {
    .hero { padding: 70px 20px 56px; min-height: 420px; }
  }
  @media (max-width: 480px) {
    .hero { padding: 60px 18px 48px; min-height: 480px; }
    .eyebrow { font-size: 11px; padding: 4px 11px; margin-bottom: 16px; }
    h1 { font-size: clamp(28px, 9vw, 40px); margin-bottom: 12px; }
    p.sub { font-size: 15px; }
  }
  @media (max-width: 360px) {
    .hero { min-height: 460px; }
    h1 { font-size: 26px; }
    p.sub { font-size: 14px; }
  }
</style>
</head>
<body>

<section class="hero">
  <div class="inner">
    <div class="eyebrow">Abonnements Pilotes</div>
    <h1>Choisis <span class="green">ta formule</span></h1>
    <p class="sub">Roule régulièrement. Progresse vraiment.</p>
  </div>
</section>

<script>
  function postHeight() {
    if (window.parent !== window) {
      window.parent.postMessage({ type: 'stratos-iframe-height', height: document.documentElement.scrollHeight }, '*');
    }
  }
  window.addEventListener('load', postHeight);
  window.addEventListener('resize', postHeight);
  new ResizeObserver(postHeight).observe(document.documentElement);
</script>

</body>
</html>
