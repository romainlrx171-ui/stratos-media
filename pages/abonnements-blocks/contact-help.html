<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Contact abonnements Stratos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: transparent; }
  body {
    font-family: 'Roboto', -apple-system, BlinkMacSystemFont, sans-serif;
    color: #212121;
    background: #F6F6F6;
  }
  .wrap {
    max-width: 720px;
    margin: 0 auto;
    padding: 36px 24px 50px;
    text-align: center;
  }
  h3 {
    font-family: 'Oswald', sans-serif;
    font-size: clamp(20px, 2.6vw, 26px);
    line-height: 1.1;
    font-weight: 600;
    color: #212121;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  p.sub {
    font-family: 'Roboto', sans-serif;
    font-weight: 300;
    font-size: 15px;
    color: #646464;
    margin-bottom: 22px;
  }
  .channels {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 12px;
  }
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 12px 22px;
    background: #fff;
    border: 1.5px solid #212121;
    border-radius: 6px;
    text-decoration: none;
    color: #212121;
    font-family: 'Oswald', sans-serif;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    transition: all 0.15s ease;
  }
  .btn:hover {
    background: #212121;
    color: #fff;
  }
  .btn.email:hover {
    background: #05E00B;
    color: #000;
    border-color: #05E00B;
  }
  .btn svg {
    width: 18px;
    height: 18px;
    stroke: currentColor;
    stroke-width: 2;
    fill: none;
    stroke-linecap: round;
    stroke-linejoin: round;
  }
</style>
</head>
<body>

<div class="wrap">
  <h3>Une question avant de souscrire ?</h3>
  <p class="sub">On répond dans la journée.</p>

  <div class="channels">
    <a href="mailto:contact@stratos-academie.com" target="_top" class="btn email">
      <svg viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
      Écris-nous
    </a>
    <a href="tel:+33000000000" target="_top" class="btn">
      <svg viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
      Appelle-nous
    </a>
  </div>
</div>

<script>
  function postHeight() {
    if (window.parent !== window) {
      window.parent.postMessage({ type: 'stratos-iframe-height', height: document.documentElement.scrollHeight }, '*');
    }
  }
  window.addEventListener('load', postHeight);
  window.addEventListener('resize', postHeight);
  new ResizeObserver(postHeight).observe(document.documentElement);
</script>

</body>
</html>
